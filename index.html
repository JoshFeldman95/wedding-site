<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Josh + Becca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cutive+Mono&family=Ovo&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="main">
      <h1 id="main-title">Becca + Josh</h1>

      <section id="address">
        <p>Speducci Mercatto</p>
        <p>46 Milford Ave</p>
        <p>Toronto</p>
      </section>

      <section id="date">
        <p>15.5.2027</p>
      </section>

      <form id="user-form">
        <div class="form-row">
          <label for="name">Name(s)</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-row">
          <span>Will you be there?</span>
          <div class="custom-radio-group">
            <label class="radio-container">
              <input type="radio" name="choice" value="yes" required />
              <span class="checkmark"></span>
              Yes
            </label>

            <label class="radio-container">
              <input type="radio" name="choice" value="no" />
              <span class="checkmark"></span>
              No
            </label>

            <label class="radio-container">
              <input type="radio" name="choice" value="maybe" />
              <span class="checkmark"></span>
              Maybe
            </label>
          </div>
        </div>
        <input
          type="text"
          name="website"
          id="website"
          autocomplete="off"
          tabindex="-1"
          style="position: absolute; left: -9999px"
        />
        <div class="form-row button-row">
          <button type="submit" id="submit-btn">Submit RSVP!</button>
        </div>
      </form>

      <div id="form-result" class="hidden"></div>
      <section id="map">
        <div id="map-container">
          <svg id="wedding-map" viewBox="0 0 600 300" width="100%" height="300">
            <!-- Background -->
            <rect width="600" height="300" />

            <!-- vertical lines -->
            <g fill="none">
              <path d="M 120 10 L 118 290" />
              <path d="M 320 10 L 318 290" />
              <path d="M 420 10 L 423 290" />
            </g>

            <!-- horizontal lines -->
            <g fill="none">
              <path d="M 10 140 L 590 138" />
              <path d="M 10 200 L 590 203" />
            </g>

            <!-- First apartment.-->
            <g
              class="map-point"
              data-title="First apartment."
              data-text="Our first apartment together (2017)"
              data-image="img/first-apartment.jpeg"
              onclick="openMapPoint(this)"
            >
              <image
                href="img/heart-navy.png"
                x="187"
                y="175"
                width="32"
                height="32"
              />
            </g>
            <!-- Baby Becca -->
            <g
              class="map-point"
              data-title="Baby Becca."
              data-text="Where Becca grew up (1998)"
              data-image="img/baby-becca.jpeg"
              onclick="openMapPoint(this)"
            >
              <image
                href="img/heart-orange.png"
                x="150"
                y="50"
                width="32"
                height="32"
              />
            </g>
            <!-- Baby Becca -->
            <g
              class="map-point"
              data-title="Baby Josh."
              data-text="Where Josh grew up (1998)"
              data-image="img/baby-josh.jpeg"
              onclick="openMapPoint(this)"
            >
              <image
                href="img/heart-green.png"
                x="250"
                y="75"
                width="32"
                height="32"
              />
            </g>
            <!-- Prom -->
            <g
              class="map-point"
              data-title="Prom"
              data-text="Prom! (2013)"
              data-image="img/prom.jpeg"
              onclick="openMapPoint(this)"
            >
              <image
                href="img/heart-pink.png"
                x="350"
                y="225"
                width="32"
                height="32"
              />
            </g>
            <!-- Will they, won't they? -->
            <g
              class="map-point"
              data-title="Will they, won't they"
              data-text="Will we, won't we? (House Island Day, 2010)"
              data-image="img/house-island-day.jpeg"
              onclick="openMapPoint(this)"
            >
              <image
                href="img/heart-green.png"
                x="315"
                y="260"
                width="32"
                height="32"
              />
            </g>
            <!-- They're in love! -->
            <g
              class="map-point"
              data-title="In love"
              data-text="We're in love! (2011)"
              data-image="img/dating.jpeg"
              onclick="openMapPoint(this)"
            >
              <image
                href="img/heart-orange.png"
                x="315"
                y="160"
                width="32"
                height="32"
              />
            </g>
            <!-- First date -->
            <g
              class="map-point"
              data-title="First date"
              data-text="First significant Italian restaurant, Il Fornello - Our first date (2010)"
              data-image="img/first-date.jpeg"
              onclick="openMapPoint(this)"
            >
              <image
                href="img/heart-navy.png"
                x="345"
                y="130"
                width="32"
                height="32"
              />
            </g>
            <!-- Speducci -->
            <g
              class="map-point"
              data-title="Speducci"
              data-text="Second significant Italian restaurant, Speducci Mercatto - Our wedding venue! (2027) "
              data-image="img/speducci.png"
              onclick="openMapPoint(this)"
            >
              <image
                href="img/heart-pink.png"
                x="50"
                y="50"
                width="32"
                height="32"
              />
            </g>
            <!-- Speducci -->
            <g
              class="map-point"
              data-title="first met"
              data-text="What we looked like when we first met (2007) "
              data-image="img/first-met.png"
              onclick="openMapPoint(this)"
            >
              <image
                href="img/heart-pink.png"
                x="200"
                y="140"
                width="32"
                height="32"
              />
            </g>

            <!-- Getting engaged -->
            <g
              class="map-point"
              data-title="Engaged"
              data-text="Fifteen years later, we're engaged! (2025) "
              data-image="img/engagement.jpeg"
              onclick="openMapPoint(this)"
            >
              <image
                href="img/heart-green.png"
                x="150"
                y="160"
                width="32"
                height="32"
              />
            </g>
          </svg>
        </div>
      </section>
    </main>
    <div id="modal">
      <!-- cards get appended here by openMapPoint() -->
    </div>
    <script src="script.js"></script>
  </body>
</html>
