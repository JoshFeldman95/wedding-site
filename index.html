<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Josh + Becca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cutive+Mono&family=Ovo&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="preloader">
      <img src="img/intro.gif" alt="Welcome..." />
    </div>
    <div id="content">
      <main class="main">
        <h1 id="main-title">Becca + Josh</h1>

        <section id="address">
          <p>Speducci Mercatto</p>
          <p>46 Milford Ave</p>
          <p>Toronto</p>
        </section>

        <section id="date">
          <p>15.5.2027</p>
        </section>

        <form id="user-form">
          <div class="form-row">
            <label>Name(s)</label>
            <input type="text" id="name" name="name" required />
          </div>

          <div class="form-row">
            <label>Address</label>
            <input type="text" id="address" name="address" required />
          </div>

          <div class="form-row">
            <span>We’re getting married! Will you be there?</span>
            <div class="custom-radio-group">
              <label class="radio-container">
                <input type="radio" name="choice" value="yes" required />
                <span class="checkmark"></span>
                Yes
              </label>

              <label class="radio-container">
                <input type="radio" name="choice" value="no" />
                <span class="checkmark"></span>
                No
              </label>

              <label class="radio-container">
                <input type="radio" name="choice" value="maybe" />
                <span class="checkmark"></span>
                Maybe
              </label>
            </div>
          </div>
          <input
            type="text"
            name="website"
            id="website"
            autocomplete="off"
            tabindex="-1"
            style="position: absolute; left: -9999px"
          />
          <div id="submit-row" class="form-row button-row">
            <button type="submit" id="submit-btn">Submit RSVP!</button>
          </div>
        </form>

        <div id="form-result" class="hidden"></div>

        <section id="map">
          <div id="map-container">
            <svg id="wedding-map" viewBox="-50 -40 569 577">
              <image
                href="img/toronto-v2.png"
                x="0"
                y="0"
                width="469"
                height="497"
                preserveAspectRatio="xMidYMid meet"
              />
              <foreignObject
                x="240"
                y="-20"
                width="260"
                height="150"
                transform="rotate(10 360 15)"
              >
                <div
                  xmlns="http://www.w3.org/1999/xhtml"
                  class="map-intro-text"
                >
                  We can't wait to celebrate with you in Toronto - explore where
                  we grew up, met, got engaged, and more!
                </div>
              </foreignObject>
              <!-- Baby Becca -->
              <g
                class="map-point"
                data-title="Baby Becca."
                data-text="Where Becca grew up"
                data-image="img/baby-becca.jpeg"
                onclick="openMapPoint(this)"
              >
                <image
                  href="img/heart-1.png"
                  x="170"
                  y="60"
                  width="48"
                  height="48"
                />
              </g>
              <!-- Baby Josh -->
              <g
                class="map-point"
                data-title="Baby Josh."
                data-text="Where Josh grew up"
                data-image="img/baby-josh.jpeg"
                onclick="openMapPoint(this)"
              >
                <image
                  href="img/heart-2.png"
                  x="220"
                  y="115"
                  width="48"
                  height="48"
                />
              </g>
              <!-- first met -->
              <g
                class="map-point"
                data-title="first met"
                data-text="Where we met - and what we looked like when we did (UTS, 2007) "
                data-image="img/first-met.png"
                onclick="openMapPoint(this)"
              >
                <image
                  href="img/heart-3.png"
                  x="210"
                  y="260"
                  width="48"
                  height="48"
                />
              </g>
              <!-- Will they, won't they? -->
              <g
                class="map-point"
                data-title="Will they, won't they"
                data-text="Where the sparks started to fly (House Island Day, 2010)"
                data-image="img/house-island-day.jpeg"
                onclick="openMapPoint(this)"
              >
                <image
                  href="img/heart-4.png"
                  x="230"
                  y="440"
                  width="48"
                  height="48"
                />
              </g>
              <!-- First date -->
              <g
                class="map-point"
                data-title="First date"
                data-text="Where we had our first date, aka the first significant Italian restaurant for our relationship (Il Fornello, 2010)"
                data-image="img/first-date.jpeg"
                onclick="openMapPoint(this)"
              >
                <image
                  href="img/heart-5.png"
                  x="290"
                  y="220"
                  width="48"
                  height="48"
                />
              </g>
              <!-- They're in love! -->
              <g
                class="map-point"
                data-title="In love"
                data-text="Where we first said I love you (Queens Park, 2011)"
                data-image="img/dating.jpeg"
                onclick="openMapPoint(this)"
              >
                <image
                  href="img/heart-6.png"
                  x="240"
                  y="290"
                  width="48"
                  height="48"
                />
              </g>
              <!-- Prom -->
              <g
                class="map-point"
                data-title="Prom"
                data-text="Where we went to prom together (The King Edward Hotel, 2013)"
                data-image="img/prom.jpeg"
                onclick="openMapPoint(this)"
              >
                <image
                  href="img/heart-7.png"
                  x="330"
                  y="380"
                  width="48"
                  height="48"
                />
              </g>
              <!-- First apartment.-->
              <g
                class="map-point"
                data-title="First apartment."
                data-text="Where we first lived together, featuring roomies Winnie and Ronnie (Dundas and Spadina, 2017)"
                data-image="img/first-apartment.jpeg"
                onclick="openMapPoint(this)"
              >
                <image
                  href="img/heart-8.png"
                  x="190"
                  y="350"
                  width="48"
                  height="48"
                />
              </g>
              <!-- Getting engaged -->
              <g
                class="map-point"
                data-title="Engaged"
                data-text="Where we live now, and where we got engaged - 15 years later! (College and Palmerston, 2025)"
                data-image="img/engagement.jpeg"
                onclick="openMapPoint(this)"
              >
                <image
                  href="img/heart-9.png"
                  x="150"
                  y="300"
                  width="48"
                  height="48"
                />
              </g>
              <!-- Speducci -->
              <g
                class="map-point"
                data-title="Speducci"
                data-text="Where we’re getting married, aka the second significant Italian restaurant for our relationship (Speducci Mercatto, 2027)"
                data-image="img/speducci.png"
                onclick="openMapPoint(this)"
              >
                <image
                  href="img/heart-10.png"
                  x="100"
                  y="50"
                  width="48"
                  height="48"
                />
              </g>
            </svg>
          </div>
        </section>
      </main>
      <div id="modal">
        <!-- cards get appended here by openMapPoint() -->
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
