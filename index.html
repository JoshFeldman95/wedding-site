<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Josh + Becca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cutive+Mono&family=Ovo&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="main">
      <h1 id="main-title">Becca + Josh</h1>

      <section id="address">
        <p>Speducci Mercatto</p>
        <p>46 Milford Ave</p>
        <p>Toronto</p>
      </section>

      <section id="date">
        <p>5.15.2027</p>
      </section>

      <form id="user-form">
        <div class="form-row">
          <label for="name">Name(s)</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-row">
          <span>Will you be there?</span>
          <div class="custom-radio-group">
            <label class="radio-container">
              <input type="radio" name="choice" value="yes" required />
              <span class="checkmark"></span>
              Yes
            </label>

            <label class="radio-container">
              <input type="radio" name="choice" value="no" />
              <span class="checkmark"></span>
              No
            </label>

            <label class="radio-container">
              <input type="radio" name="choice" value="maybe" />
              <span class="checkmark"></span>
              Maybe
            </label>
          </div>
        </div>
        <input
          type="text"
          name="website"
          id="website"
          autocomplete="off"
          tabindex="-1"
          style="position: absolute; left: -9999px"
        />
        <div class="form-row button-row">
          <button type="submit" id="submit-btn">Submit RSVP</button>
        </div>
      </form>

      <section id="map">
        <div id="map-placeholder">Placeholder</div>
      </section>
    </main>

    <div id="form-result" class="hidden"></div>

    <div id="modal" class="hidden">
      <div class="modal-content">
        <button id="close-modal">&times;</button>
        <h3 id="modal-title"></h3>
        <img id="modal-image" alt="" />
        <p id="modal-text"></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
