<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Josh + Becca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cutive+Mono&family=Ovo&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="main">
      <h1 id="main-title">Becca + Josh</h1>

      <section id="address">
        <p>Speducci Mercatto</p>
        <p>46 Milford Ave</p>
        <p>Toronto</p>
      </section>

      <section id="date">
        <p>5.15.2027</p>
      </section>

      <form id="user-form">
        <div class="form-row">
          <label for="name">Name(s)</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-row">
          <span>Will you be there?</span>
          <div class="custom-radio-group">
            <label class="radio-container">
              <input type="radio" name="choice" value="yes" required />
              <span class="checkmark"></span>
              Yes
            </label>

            <label class="radio-container">
              <input type="radio" name="choice" value="no" />
              <span class="checkmark"></span>
              No
            </label>

            <label class="radio-container">
              <input type="radio" name="choice" value="maybe" />
              <span class="checkmark"></span>
              Maybe
            </label>
          </div>
        </div>
        <input
          type="text"
          name="website"
          id="website"
          autocomplete="off"
          tabindex="-1"
          style="position: absolute; left: -9999px"
        />
        <div class="form-row button-row">
          <button type="submit" id="submit-btn">Submit RSVP</button>
        </div>
      </form>

      <div id="form-result" class="hidden"></div>
      <section id="map">
        <div id="map-container">
          <svg id="wedding-map" viewBox="0 0 600 300" width="100%" height="300">
            <!-- Background -->
            <rect width="600" height="300" fill="#fbf9f6" />

            <!-- A simple “path” line (story route) -->
            <g opacity="0.35" stroke="#1c1712" stroke-width="1.2" fill="none">
              <path d="M 120 10 L 118 290" />
              <path d="M 320 10 L 318 290" />
              <path d="M 420 10 L 423 290" />
            </g>

            <!-- horizontal lines -->
            <g opacity="0.25" stroke="#1c1712" stroke-width="1.2" fill="none">
              <path d="M 10 140 L 590 138" />
              <path d="M 10 200 L 590 203" />
            </g>

            <!-- LOCATION 1: First date.-->
            <g
              class="map-point"
              data-title=""
              data-text="First Date."
              data-image="https://images.unsplash.com/photo-1521017432531-fbd92d768814"
              onclick="openMapPoint(this)"
            >
              <text x="195" y="175" font-size="12" fill="#1c1712">💙</text>
            </g>
            <!-- LOCATION 1: Where we met.-->
            <g
              class="map-point"
              data-title=""
              data-text="Where we met."
              data-image="https://images.unsplash.com/photo-1521017432531-fbd92d768814"
              onclick="openMapPoint(this)"
            >
              <text x="185" y="135" font-size="12" fill="#1c1712">❤️</text>
            </g>
            <g
              class="map-point"
              data-title=""
              data-text="Where we met."
              data-image="https://images.unsplash.com/photo-1521017432531-fbd92d768814"
              onclick="openMapPoint(this)"
            >
              <text x="305" y="115" font-size="12" fill="#1c1712">💛</text>
            </g>
            <g
              class="map-point"
              data-title=""
              data-text="Speducci!"
              data-image="https://images.unsplash.com/photo-1521017432531-fbd92d768814"
              onclick="openMapPoint(this)"
            >
              <text x="305" y="415" font-size="12" fill="#1c1712">🧡</text>
            </g>
            <g
              class="map-point"
              data-title=""
              data-text="Speducci!"
              data-image="https://images.unsplash.com/photo-1521017432531-fbd92d768814"
              onclick="openMapPoint(this)"
            >
              <text x="385" y="255" font-size="12" fill="#1c1712">💜</text>
            </g>
            <g
              class="map-point"
              data-title=""
              data-text="Speducci!"
              data-image="https://images.unsplash.com/photo-1521017432531-fbd92d768814"
              onclick="openMapPoint(this)"
            >
              <text x="515" y="215" font-size="12" fill="#1c1712">💚</text>
            </g>
          </svg>
        </div>
      </section>
    </main>
    <div id="modal">
      <!-- cards get appended here by openMapPoint() -->
    </div>
    <script src="script.js"></script>
  </body>
</html>
